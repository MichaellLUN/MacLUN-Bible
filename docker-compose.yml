services:
  # 网站1：8081端口
  website-1:
    build: .
    container_name: bible-website-1
    restart: always
    ports:
      - "8081:80"
    networks:
      - bible-network

  # 网站2：8082端口
  website-2:
    build: .
    container_name: bible-website-2
    restart: always
    ports:
      - "8082:80"
    networks:
      - bible-network

  # 网站3：8083端口
  website-3:
    build: .
    container_name: bible-website-3
    restart: always
    ports:
      - "8083:80"
    networks:
      - bible-network

networks:
  bible-network:
    driver: bridge